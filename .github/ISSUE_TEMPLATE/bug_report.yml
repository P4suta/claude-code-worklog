name: Bug report
description: Something isn't working as expected.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Running `worklog daily` produced …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s), and any relevant flags or env vars.
      placeholder: |
        1. worklog daily --date 2026-06-27
        2. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `worklog --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Optional. Re-run with `-vv` and paste relevant output (redact anything sensitive).
      render: text
    validations:
      required: false
