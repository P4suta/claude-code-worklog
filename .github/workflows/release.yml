# Tag-driven binary release.
#
# Push a `vX.Y.Z` tag (or run manually) and this builds `worklog` for four
# targets, bundles each with shell completions, man pages, the README, and the
# licenses, then publishes the archives to a GitHub Release with a SHA256SUMS
# manifest and a keyless Sigstore build-provenance attestation.
#
# Each target builds natively on its own runner, so the freshly built binary is
# runnable there to emit its own completions/man pages (no cross-exec).
#
# Verify a downloaded archive:
#   gh attestation verify <archive> --repo P4suta/claude-code-worklog

name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: v
        shell: bash
        # On a tag build use the tag (minus the leading `v`); a manual run has
        # no tag, so fall back to the workspace version with a `-dev` marker.
        run: |
          if [ "$GITHUB_REF_TYPE" = tag ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)-dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"

  build:
    needs: meta
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p worklog-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          name="worklog-${VERSION}-${TARGET}"
          stage="dist/${name}"
          bin="target/${TARGET}/release/worklog"
          mkdir -p "${stage}/completions" "${stage}/man"
          cp "${bin}" "${stage}/"
          "${bin}" completions bash       > "${stage}/completions/worklog.bash"
          "${bin}" completions zsh        > "${stage}/completions/_worklog"
          "${bin}" completions fish       > "${stage}/completions/worklog.fish"
          "${bin}" completions powershell > "${stage}/completions/_worklog.ps1"
          "${bin}" man "${stage}/man"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "${stage}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $name  = "worklog-$env:VERSION-$env:TARGET"
          $stage = "dist/$name"
          $bin   = "target/$env:TARGET/release/worklog.exe"
          New-Item -ItemType Directory -Force -Path "$stage/completions", "$stage/man" | Out-Null
          Copy-Item $bin "$stage/"
          & $bin completions bash       | Out-File -Encoding utf8 "$stage/completions/worklog.bash"
          & $bin completions zsh        | Out-File -Encoding utf8 "$stage/completions/_worklog"
          & $bin completions fish       | Out-File -Encoding utf8 "$stage/completions/worklog.fish"
          & $bin completions powershell | Out-File -Encoding utf8 "$stage/completions/_worklog.ps1"
          & $bin man "$stage/man"
          Copy-Item README.md, CHANGELOG.md, LICENSE-MIT, LICENSE-APACHE "$stage/"
          Compress-Archive -Path "$stage" -DestinationPath "dist/$name.zip"
          (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" |
            Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: worklog-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # keyless Sigstore signing
      attestations: write # record the build-provenance attestation
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ( cd dist && sha256sum -- *.tar.gz *.zip > SHA256SUMS.txt )
          echo "Assets:" && ls -1 dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
