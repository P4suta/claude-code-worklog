# Weekly RustSec advisory scan.
#
# ci.yml's `deny` job already runs `check advisories` on every push/PR, but only
# when something changes. This scheduled run re-checks the *unchanged* committed
# Cargo.lock against the latest advisory DB, so a CVE disclosed after the last
# commit still surfaces. Also runnable on demand.

name: audit

on:
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo-deny advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories
