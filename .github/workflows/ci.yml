# cc-worklog CI.
#
# Layers, cheapest first:
#   - lint    : fmt / clippy / typos / machete on ubuntu (fast fail).
#   - test    : cargo test across ubuntu + windows + macos (paths.rs and the
#               CLI touch OS-specific path handling, so all three matter).
#   - msrv    : the pinned MSRV (1.95.0) still builds.
#   - deny    : cargo-deny advisories / bans / licenses / sources.
#   - ci      : single aggregate gate for branch protection.
#
# Third-party actions are pinned to a full commit SHA; the `# vX.Y.Z` trailer
# is the human-readable tag. Dependabot (github-actions) bumps them weekly.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  lint:
    name: fmt + clippy + typos + machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install typos + cargo-machete
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: typos-cli, cargo-machete

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: typos
        run: typos

      - name: cargo-machete
        run: cargo machete

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: test
        run: |
          cargo test --workspace
          cargo test --doc --workspace

  msrv:
    name: msrv (rust 1.95.0)
    runs-on: ubuntu-latest
    # RUSTUP_TOOLCHAIN outranks rust-toolchain.toml (which pins `stable`), so
    # the build genuinely exercises a clean rustc 1.95.0 — the declared MSRV.
    env:
      RUSTUP_TOOLCHAIN: 1.95.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.95.0 (MSRV)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: msrv

      - name: cargo check
        run: cargo check --workspace --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories bans licenses sources

  # Conventional Commits (committed, config in committed.toml). PR-only, and
  # skipped for Dependabot (its subjects exceed the 50-char limit and its PRs
  # squash-merge under a maintainer subject).
  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: committed
      - name: Check Conventional Commits
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          git rev-list --no-merges "$base..$head" | xargs -rn1 committed

  # Single required check for branch protection: green only when every needed
  # job succeeded. `if: always()` so it still runs (and can fail) when an
  # upstream job fails or is cancelled.
  ci:
    name: ci
    if: always()
    needs: [lint, test, msrv, deny, commitlint]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
